<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfd"/>
      <stop offset="100%" stop-color="#dde7f7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#c2185b"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title block -->
  <text x="800" y="105" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',Helvetica,sans-serif" font-size="54" font-weight="800" text-anchor="middle" fill="#0c3d8a">让工作流驱动 AI 和人，而不是相反</text>
  <text x="800" y="160" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',Helvetica,sans-serif" font-size="24" font-weight="500" text-anchor="middle" fill="#5a3e00">AI Native 交付工作流 · 上篇</text>
  <line x1="640" y1="185" x2="960" y2="185" stroke="#94a3b8" stroke-width="2"/>

  <!-- Workflow rail -->
  <line x1="150" y1="500" x2="1450" y2="500" stroke="#94a3b8" stroke-width="3" stroke-dasharray="14 8"/>

  <!-- Connect arrows between nodes -->
  <line x1="320" y1="500" x2="408" y2="500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="552" y1="500" x2="640" y2="500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="800" y1="500" x2="888" y2="500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1032" y1="500" x2="1120" y2="500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1280" y1="500" x2="1368" y2="500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Node 1: AI 需求拆解 -->
  <g transform="translate(240,500)">
    <circle cx="0" cy="0" r="80" fill="#e8f0fe" stroke="#1a73e8" stroke-width="5"/>
    <text y="-12" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="19" font-weight="bold" text-anchor="middle" fill="#1a73e8">AI</text>
    <text y="22" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#0c3d8a">需求拆解</text>
  </g>

  <!-- Node 2: 人审核 -->
  <g transform="translate(480,500)">
    <polygon points="0,-72 72,0 0,72 -72,0" fill="#fff4d6" stroke="#d4a017" stroke-width="5"/>
    <text y="-5" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#d4a017">人</text>
    <text y="25" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#5a3e00">审核</text>
  </g>

  <!-- Node 3: AI 编码 -->
  <g transform="translate(720,500)">
    <circle cx="0" cy="0" r="80" fill="#e8f0fe" stroke="#1a73e8" stroke-width="5"/>
    <text y="-12" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="19" font-weight="bold" text-anchor="middle" fill="#1a73e8">AI</text>
    <text y="22" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#0c3d8a">编码</text>
  </g>

  <!-- Node 4: 人审核 -->
  <g transform="translate(960,500)">
    <polygon points="0,-72 72,0 0,72 -72,0" fill="#fff4d6" stroke="#d4a017" stroke-width="5"/>
    <text y="-5" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#d4a017">人</text>
    <text y="25" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#5a3e00">审核</text>
  </g>

  <!-- Node 5: AI ×N (clean offset stacking, no opacity blur) -->
  <g transform="translate(1200,500)">
    <circle cx="20" cy="16" r="80" fill="#ffffff" stroke="#1a73e8" stroke-width="3"/>
    <circle cx="10" cy="8" r="80" fill="#f3f7ff" stroke="#1a73e8" stroke-width="3"/>
    <circle cx="0" cy="0" r="80" fill="#e8f0fe" stroke="#1a73e8" stroke-width="5"/>
    <text y="-12" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="19" font-weight="bold" text-anchor="middle" fill="#1a73e8">AI × N</text>
    <text y="22" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#0c3d8a">并发审计</text>
  </g>

  <!-- Output: PR -->
  <g transform="translate(1430,500)">
    <rect x="-62" y="-44" width="124" height="88" rx="44" fill="#e6f4ea" stroke="#34a853" stroke-width="5"/>
    <text y="-2" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#0d4d2a">PR</text>
    <text y="28" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#0d4d2a">交付</text>
  </g>

  <!-- Memory flywheel cylinder -->
  <g transform="translate(800,750)">
    <ellipse cx="0" cy="-20" rx="220" ry="20" fill="#fde7f3" stroke="#c2185b" stroke-width="4"/>
    <path d="M -220,-20 L -220,20 A 220,20 0 0 0 220,20 L 220,-20" fill="#fde7f3" stroke="#c2185b" stroke-width="4"/>
    <ellipse cx="0" cy="-20" rx="220" ry="20" fill="none" stroke="#c2185b" stroke-width="4"/>
    <text y="-2" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#5a0d34">团队记忆 · 长期飞轮</text>
    <text y="26" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="15" font-weight="500" text-anchor="middle" fill="#7a1d34">反问 Q&amp;A · 决策依据 · 跑出来的经验</text>
  </g>

  <!-- Dashed lines from human nodes down to memory -->
  <path d="M 480,572 Q 560,680 670,728" stroke="#c2185b" stroke-width="3" stroke-dasharray="10 6" fill="none"/>
  <path d="M 960,572 Q 880,680 770,728" stroke="#c2185b" stroke-width="3" stroke-dasharray="10 6" fill="none"/>
  <!-- Recall arrow back -->
  <path d="M 600,732 Q 410,680 252,580" stroke="#c2185b" stroke-width="3" stroke-dasharray="10 6" fill="none" marker-end="url(#arrowPink)"/>
  <text x="370" y="665" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="16" font-weight="600" fill="#c2185b">按相关性召回 + 注入下一次</text>
  <text x="635" y="618" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="16" font-weight="600" fill="#c2185b">反问 / 决策沉淀</text>

  <!-- Legend -->
  <text x="800" y="860" font-family="'PingFang SC','Microsoft YaHei',Helvetica,sans-serif" font-size="18" text-anchor="middle" fill="#475569">
    <tspan fill="#1a73e8" font-weight="bold">蓝 = AI 节点</tspan>
    <tspan>　</tspan>
    <tspan fill="#d4a017" font-weight="bold">黄 = 人审核 / 反问</tspan>
    <tspan>　</tspan>
    <tspan fill="#c2185b" font-weight="bold">粉 = 团队记忆飞轮</tspan>
    <tspan>　</tspan>
    <tspan fill="#34a853" font-weight="bold">绿 = 产物交付</tspan>
  </text>
</svg>
