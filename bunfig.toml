[install]
# Use exact versions in lockfile by default; allow caret in package.json.
exact = false

[test]
# Low-level `bun test` discovery is backend-only. The repository gate is
# `bun run test`, which runs backend with file isolation + randomized order,
# then explicitly runs the shared and frontend suites.
root = "packages/backend/tests"
preload = ["./packages/backend/tests/setup.ts"]
