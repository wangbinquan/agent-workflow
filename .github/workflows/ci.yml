name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin opencode so the global install is reproducible AND cacheable — a
  # drifting `latest` can't be a stable cache key and quietly changes runtime
  # behavior between runs. Must stay >= MIN_OPENCODE_VERSION
  # (packages/backend/src/util/opencode.ts); matches integration-opencode.yml's
  # pinned leg. Bump together when MIN_OPENCODE_VERSION moves.
  OPENCODE_VERSION: '1.15.5'

jobs:
  lint:
    # OS-independent gates (prettier / eslint / tsc) plus the tiny shared unit
    # suite. These are deterministic across platforms, so running them once on
    # ubuntu — instead of on every OS as the old monolithic `check` job did —
    # removes ~120s of duplicated work from the critical path with zero loss of
    # signal. No opencode needed: none of these spawn the daemon.
    name: Lint + Typecheck + Format + Shared tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Keep CI byte-for-byte aligned with packageManager. Patch releases
          # can change test-runner isolation/coverage semantics; bump together.
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        # setup-bun caches only the bun binary, not the dependency tree, so
        # `bun install` cold-hits npm every run. Cache bun's global package
        # store keyed on the lockfile hash. --frozen-lockfile still re-validates
        # the lockfile, so a stale cache cannot silently change resolved versions.
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (shared, bun:test)
        run: bun run --filter @agent-workflow/shared test

  test-backend:
    # The backend suite (~740 files) is the single biggest CI cost center, and
    # macOS process-spawn makes `--isolate` (one fresh process per file, run
    # serially) especially slow there (~408s in the old job). Bun `--parallel`
    # would be ~3x faster but DEADLOCKS this suite — several files spawn a real
    # daemon that takes a single-instance flock, so running them concurrently in
    # one VM contends forever. Sharding across runners keeps each shard serial
    # and isolated (a separate VM = a separate flock/home/port namespace, so no
    # parallel-safety change at all) while cutting wall-clock ~4x. Bun assigns
    # files to shards deterministically by path, so every env-gated test still
    # runs in exactly one shard.
    name: Backend tests (${{ matrix.os }} shard ${{ matrix.shard }}/4)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3, 4]
    runs-on: ${{ matrix.os }}
    # A sync child-process stall once left macOS shard 4 silent for 17+ minutes.
    # Healthy shards finish in a few minutes; fail closed well before Actions'
    # six-hour default while retaining ample slow-runner headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install opencode (required by daemon/doctor tests)
        # Daemon `start` refuses to run without opencode >= MIN_OPENCODE_VERSION;
        # cli `doctor` asserts opencode is in PATH. Any shard may hold a
        # daemon-spawning file, so install it on every shard.
        run: |
          bun install -g opencode-ai@${{ env.OPENCODE_VERSION }}
          export PATH="$HOME/.bun/bin:$PATH"
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Keep random order coverage while making a wedged run reproducible. Bun
      # normally prints its generated seed only in the final summary, which is
      # unavailable when the job-level timeout kills a frozen test process.
      # A rerun of the same Actions run keeps the same run number and therefore
      # the same per-shard seed.
      - name: Derive reproducible backend test seed
        shell: bash
        run: |
          seed=$(( (GITHUB_RUN_NUMBER * 10 + MATRIX_SHARD) % 2147483647 ))
          if (( seed == 0 )); then seed=1; fi
          echo "BUN_TEST_SEED=$seed" >> "$GITHUB_ENV"
          echo "Backend test seed: $seed"
        env:
          MATRIX_SHARD: ${{ matrix.shard }}

      # --isolate prevents coverage-mode module singletons from leaking across
      # files; --randomize exposes any remaining within-file order dependency and
      # prints a seed that reproduces the failure; --shard=N/4 selects this
      # runner's quarter of the files. Coverage is instrumented only on ubuntu.
      - name: Test backend (ubuntu shard — with coverage)
        if: matrix.os == 'ubuntu-latest'
        run: bun test --isolate --randomize --seed="$BUN_TEST_SEED" --shard=${{ matrix.shard }}/4 --coverage --coverage-reporter=text --coverage-reporter=lcov
        env:
          # Real-git-clone (file:// + recursive submodules) and external MCP-spawn
          # integration suites are gated behind RUN_GIT_NETWORK so local `bun test`
          # stays deterministic. CI has the environment to run them.
          RUN_GIT_NETWORK: '1'
          # Chaos scenarios mutate only isolated temporary directories and inject
          # deterministic filesystem faults. Keep them opt-in locally, but execute
          # them in the ubuntu gate so they cannot remain permanently skipped.
          RUN_CHAOS: '1'

      - name: Test backend (macOS shard — no coverage)
        if: matrix.os != 'ubuntu-latest'
        run: bun test --isolate --randomize --seed="$BUN_TEST_SEED" --shard=${{ matrix.shard }}/4
        env:
          RUN_GIT_NETWORK: '1'
          # RFC-205: macOS runners ship sandbox-exec — run the REAL-mechanism
          # sandbox smoke here (ubuntu has no bwrap; the test double-gates on
          # the probe anyway).
          RUN_SANDBOX_ITEST: '1'

      - name: Upload backend coverage to Codecov (ubuntu shards)
        # Each ubuntu shard emits an lcov covering its quarter of the files;
        # Codecov merges the four per-commit uploads into one report, so total
        # coverage is identical to the old single-runner run. Tokenless upload
        # works for public repos; a per-shard flag keeps the uploads distinct.
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          flags: backend-shard-${{ matrix.shard }}
          name: backend-coverage-shard-${{ matrix.shard }}
          fail_ci_if_error: false
          disable_search: true

  test-frontend:
    # The vitest suite (~590 files) is the second-biggest cost center (~298s on
    # macOS). vitest already parallelizes across cores within a runner; sharding
    # across runners cuts wall-clock a further ~3x. Invoked through the same
    # `bun run --filter … test` entrypoint (with `-- --shard`) the local gate
    # uses, so the suite command is unchanged — only the file subset differs.
    name: Frontend tests (${{ matrix.os }} shard ${{ matrix.shard }}/3)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test (frontend, vitest shard)
        run: bun run --filter @agent-workflow/frontend test -- --shard=${{ matrix.shard }}/3

  scans:
    # Lightweight static gates that run in parallel with the lint / test jobs.
    # Ubuntu-only because none of these are OS-specific. Kept in a single job so
    # the four actions share one checkout / bun install.
    name: Static scans (audit + actionlint + shellcheck + gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks needs full history to scan commits; the other tools are
          # happy with shallow but the extra depth is cheap.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: bun audit (high+critical dependency vulnerabilities)
        # `--audit-level=high` only fails on high / critical advisories,
        # filtering out the long moderate tail (typical dev-only noise like
        # esbuild < 0.25, which only affects `vite dev` and doesn't ship in
        # the single binary). `--prod` was tried first but isn't a documented
        # flag in bun 1.3.x audit (the help only lists --json / --audit-level
        # / --ignore). When CI floated to Bun 1.3.14, `--prod` appeared to be
        # silently ignored: moderate dev advisories still failed the gate. Filtering
        # by severity is portable across bun versions and matches what local
        # `bun audit --audit-level=high` reports.
        #
        # If this becomes noisy with unfixable transitive high+critical
        # advisories, address per-advisory (override / patch / upstream
        # issue / --ignore <GHSA>); do NOT silently downgrade to
        # continue-on-error.
        #
        # GHSA-w7jw-789q-3m8p (shell-quote quote() does not escape newlines):
        # transitive, dev/tooling-only — pulled via drizzle-orm/drizzle-kit ›
        # gel (the EdgeDB/Gel driver), which the platform does NOT use (runtime
        # is bun:sqlite) and which is NOT in the shipped single binary. The
        # installed shell-quote@1.8.3 is the latest version satisfying the
        # range and is still in the affected set (<=1.8.3), so there is no fix
        # to update to yet. Scoped --ignore per the policy above; REMOVE when
        # drizzle bumps its transitive shell-quote past the advisory.
        #
        # 2026-07-21 — three more high advisories surfaced in the FLOATING
        # advisory DB (not from any lockfile change; a plain re-run started
        # failing). All three are dev/tooling-only transitive deps, none in the
        # shipped single binary, and forcing patched versions would major-bump
        # internals of eslint/minimatch/drizzle-kit for the whole repo — so
        # scoped --ignore per the documented policy, REMOVE each when its parent
        # tool bumps past the range:
        #   GHSA-395f-4hp3-45gv (shell-quote quadratic-DoS in parse()):
        #     drizzle-kit / drizzle-orm — dev migration tooling.
        #   GHSA-3jxr-9vmj-r5cp (brace-expansion DoS): eslint / eslint-plugin-
        #     react / typescript-eslint › minimatch — lint tooling.
        #   GHSA-52cp-r559-cp3m (js-yaml merge-key quadratic CPU): eslint ›
        #     @eslint/eslintrc — lint tooling.
        run: >-
          bun audit --audit-level=high
          --ignore GHSA-w7jw-789q-3m8p
          --ignore GHSA-395f-4hp3-45gv
          --ignore GHSA-3jxr-9vmj-r5cp
          --ignore GHSA-52cp-r559-cp3m

      - name: actionlint (GitHub Actions workflow lint)
        # Pinned via the official downloader script so the version moves only
        # when we explicitly bump it.
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: shellcheck (shell script lint)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # Exclude vendor / artefact dirs — without this the action recurses
          # into node_modules (playwright-core's xdg-open has SC2145 errors,
          # cytoscape's release scripts have SC2086 etc) and we'd be linting
          # code we don't own. Restrict to the repo's own scripts.
          ignore_paths: node_modules dist .git
          # Start strict on our own scripts — current ones
          # (`e2e/fixtures/*.sh`, scripts/git-hooks/*, tests/fixtures/fake-npm.sh)
          # are mostly `set -eu` clean. `severity: error` only fails on hard
          # bugs (e.g. SC2145 mixed array/string); style / info / warning
          # findings still print to the log so they're visible without
          # blocking merge. Tighten by lowering severity once the existing
          # warnings (e.g. unused RAW_PROMPT in stub-opencode-clarify-inline)
          # are cleaned up. NOTE: SHELLCHECK_SEVERITY env var has no effect on
          # this action — the documented input is `severity`.
          severity: error

      - name: gitleaks (secret scanning)
        # gitleaks/gitleaks-action@v2 still ships `using: "node20"` and has no
        # Node 24 release, which triggers a runner-level deprecation warning on
        # every CI run. Install the upstream binary directly instead — same
        # scan, no JS-action runtime involved. Pin a known version so the
        # behavior is reproducible; bump when needed.
        run: |
          set -euo pipefail
          version=8.30.1
          tmp=$(mktemp -d)
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C "$tmp" gitleaks
          "$tmp/gitleaks" detect --source . --no-banner --redact --verbose

      - name: drizzle-kit check (DB schema/migration drift)
        # The SQLite DB is the platform's source of truth; an inconsistent
        # migrations folder (re-numbered, duplicated, or missing journal
        # entries after a bad rebase) silently corrupts every user's DB on
        # next `start`. `db:check` (= `drizzle-kit check`) validates the
        # migrations folder is internally consistent — no orphan SQL files,
        # journal in sync, no version collisions. Runs in <1s.
        run: bun run --filter @agent-workflow/backend db:check

  perf:
    # RFC-054 W3-2 — perf microbenchmark gate. Runs 5 hot-path operations
    # vs the committed `tests/perf/baseline.json` and fails on regression
    # (ratio ≥ 1.2 AND delta ≥ 0.1ms). Ubuntu-only — macOS runner variance
    # is too high for a tight gate; cross-platform parity is verified
    # manually via packages/backend/scripts/perf-sweep.ts on release.
    name: Perf microbenchmark gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run microbenchmarks
        run: bun run tests/perf/run.ts --out /tmp/current-perf.json

      - name: Diff vs baseline (fail on regression ≥ 20% AND ≥ 0.1ms)
        run: bun run tests/perf/diff.ts tests/perf/baseline.json /tmp/current-perf.json

      - name: Upload current perf report on regression
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: perf-current
          path: /tmp/current-perf.json
          if-no-files-found: ignore

  docs:
    # Catch broken links / dead RFC cross-references before they rot the
    # design docs. design/ has 50+ RFC dirs with relative `../RFC-NNN/...`
    # paths and external pointers (multica / opencode source) — easy for
    # any of them to silently break. Skips docs/blog/ (drafts may carry
    # placeholder URLs) and root README (points at future PRs / external
    # integrations on purpose).
    name: Markdown link check (design/)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Lychee — fail on broken links in design/
        uses: lycheeverse/lychee-action@v2
        with:
          # 403 / 429 are accepted because some sites (GitHub anonymous,
          # Wikipedia rate limits) block CI runners — those aren't
          # actionable as "broken links". 200 / 206 cover normal + range.
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,403,429
            'design/**/*.md'
          fail: true
          jobSummary: true
        env:
          # Use the workflow token for github.com requests so lychee gets
          # authenticated rate limits (5000/hr) instead of anonymous
          # (60/hr) — otherwise GitHub links will randomly red on busy
          # PRs even when valid.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binary:
    name: Build single-binary (smoke)
    # Order the binary build + e2e AFTER the fast, cheap checks and the full test
    # matrix so their logs read top-down and a green run costs the same as before.
    # Each is a separate job now that the old monolithic `check` was split for
    # sharding.
    needs: [lint, test-backend, test-frontend]
    # …but `needs` alone SKIPS this job when any dependency is red, and a skipped
    # guard is indistinguishable from a guard that ran clean. This repository is
    # developed main-only with several sessions pushing concurrently, so an
    # unrelated backend shard going red is routine — and it used to silently take
    # the binary smoke, the e2e suite, the a11y sweep and the focus-ring geometry
    # audit down with it (RFC-206 was signed off on a run where its own new guard
    # never executed). `!cancelled()` keeps the ordering while letting these run
    # anyway; a superseding push still cancels the whole run as before.
    # See design/test-guard-audit-2026-07-21 §2 逃逸机制⑥.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install opencode (start --version probe needs it for log lines)
        # The smoke test invokes `agent-workflow version`, which does not touch
        # opencode — but the start path does, and we want the binary to be
        # ready to run an end-to-end smoke locally if anyone reuses this job.
        run: |
          bun install -g opencode-ai@${{ env.OPENCODE_VERSION }}
          export PATH="$HOME/.bun/bin:$PATH"
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build single-binary
        run: bun run build:binary

      - name: Show artifact size
        run: ls -lh dist/

      - name: Smoke-run binary (version + doctor)
        # `ls -lh` only checks the artifact exists; a build can succeed yet
        # produce a binary that crashes at startup (broken bundle, missing
        # native bindings, stripped permissions). Exec the binary to catch
        # those before the artifact ships.
        #
        # `version` validates command dispatch + bundle integrity.
        # `doctor` exercises opencode PATH resolution + git probe + the
        # IS_EMBEDDED-aware migrations check end-to-end.
        #
        # NOTE: CLI uses subcommand-style (`agent-workflow version`), not
        # POSIX flag-style (`--version`) — see packages/backend/src/main.ts
        # `case 'version'`.
        #
        # `find` instead of `ls | head` to satisfy actionlint's embedded
        # shellcheck (SC2012) — robust under names with whitespace even
        # though the canonical asset names here never contain any.
        run: |
          set -euxo pipefail
          bin=$(find dist -maxdepth 1 -type f -name 'agent-workflow-*' | head -n 1)
          chmod +x "$bin"
          "$bin" version
          "$bin" doctor

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: agent-workflow-${{ matrix.os }}
          path: dist/agent-workflow-*
          if-no-files-found: error

  e2e:
    # Playwright happy-path against the single binary that `build-binary`
    # already produced and uploaded — we download it instead of rebuilding on
    # every shard. download/upload-artifact drops the +x bit, so a one-line
    # `chmod +x` restores it (cheap, vs. a full vite build + --compile per
    # shard). This eliminates 8 redundant binary rebuilds (2 OS × 4 shards)
    # per CI run; e2e/harness.ts only needs the file to exist + be executable.
    #
    # RFC-054 W1-8 — `shard` matrix splits the suite into 4 buckets per OS
    # so total e2e wall-clock drops from ~50s (single runner) to ~15s per
    # shard runner running in parallel. Each shard runner uses Playwright's
    # built-in `--shard=N/M` flag (which distributes test files round-robin
    # at file granularity, so a single file's tests stay co-located and
    # `test.beforeAll` semantics hold).
    name: Playwright e2e (shard ${{ matrix.shard }}/4)
    needs: build-binary
    # Same reasoning as build-binary's `if`: a red unit shard must not silently
    # skip the only layer that exercises real layout, real browser a11y and the
    # shipped binary. If build-binary itself failed there is no artifact to
    # download and this job fails loudly on the download step — which is the
    # honest signal, unlike a skip.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3, 4]
    runs-on: ${{ matrix.os }}
    # Cold browser/system-dependency installation needs more headroom than the
    # unit jobs, but must not inherit Actions' six-hour default.
    timeout-minutes: 20
    env:
      # Pin Playwright's browser dir to a workspace path so the cache key/path
      # is identical across Linux/macOS (defaults differ: ~/.cache/ms-playwright
      # vs ~/Library/Caches/ms-playwright). Playwright honors this on all OSes.
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.ms-playwright
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Cache bun package downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        # Playwright (the test runner) lives in devDependencies; the binary
        # under test comes from the downloaded artifact below, not this install.
        run: bun install --frozen-lockfile

      - name: Download single-binary from build-binary
        # Reuse the artifact build-binary already produced for this OS instead
        # of rebuilding it on every shard (see job comment above).
        uses: actions/download-artifact@v8
        with:
          name: agent-workflow-${{ matrix.os }}
          path: dist

      - name: Restore executable bit on the binary
        # upload/download-artifact does not preserve the +x mode bit.
        run: chmod +x dist/agent-workflow-*

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers (+ system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit, Linux only)
        # On a browser-cache hit we still need the apt libraries on Linux
        # runners (they aren't part of the cached browser dir). macOS needs no
        # system deps, so this is Linux-gated.
        if: steps.pw-cache.outputs.cache-hit == 'true' && runner.os == 'Linux'
        run: bunx playwright install-deps chromium

      - name: Run e2e (shard ${{ matrix.shard }}/4)
        env:
          CI: 'true'
        run: bun run e2e -- --shard=${{ matrix.shard }}/4

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          # Shard in the artifact name so all 8 shards' traces can coexist
          # in the same workflow run when multiple fail (otherwise the
          # later one would overwrite the earlier).
          name: playwright-trace-${{ matrix.os }}-shard${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
