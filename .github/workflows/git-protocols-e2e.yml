# RFC-054 W3-4 — git protocols e2e against a real Gitea container.
#
# Why a separate workflow vs. extending ci.yml:
#   * Gitea container boot + seed adds ~35s of fixed overhead per run.
#     Adding that to every PR's 4-shard e2e matrix would burn ~5min/PR
#     of compute for a surface that only changes when gitRepoCache.ts /
#     git-url.ts touch the diff.
#   * The git-protocol surface is highly stable — a daily nightly + a
#     path-filtered PR trigger gives us drift detection at the right
#     cadence.
#
# Trigger:
#   * `schedule` — 08:00 UTC daily (30 min after the opencode integration
#     workflow + webkit nightly so they don't queue on the same free
#     runner pool).
#   * `workflow_dispatch` — manual button for ad-hoc verification.
#   * `pull_request` — only when the diff touches files this suite is
#     designed to catch regressions in.

name: git-protocols-e2e

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/backend/src/services/gitRepoCache.ts'
      - 'packages/backend/src/services/repoBatchImport.ts'
      - 'packages/shared/src/git-url.ts'
      - 'scripts/git-protocols/**'
      - 'e2e/git-protocols.spec.ts'
      - '.github/workflows/git-protocols-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  git-protocols:
    name: gitea HTTPS + SSH clone (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.x'

      - name: Bring up gitea
        # ubuntu-latest has docker pre-installed; no setup-docker needed.
        # Compose v2 syntax (`docker compose`, not legacy `docker-compose`).
        run: |
          docker compose -f scripts/git-protocols/docker-compose.test.yml up -d
          echo "Gitea container starting; healthcheck will block downstream."

      - name: Seed admin user / token / repo
        # The script exits 0 only on success — non-zero short-circuits
        # the whole job (no cleanup ambiguity).
        id: seed
        run: |
          set -euo pipefail
          # Tee stdout to GITHUB_ENV so the spec inherits the credentials.
          ./scripts/git-protocols/seed-gitea.sh | tee /tmp/seed.env
          # Each `KEY=VAL` line into the workflow env for subsequent steps.
          grep -E '^[A-Z_]+=' /tmp/seed.env >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build daemon binary (spec spawns it via harness)
        run: bun run build:binary

      - name: Install Playwright (chromium only — git spec is headless API-driven)
        run: bunx playwright install --with-deps chromium

      - name: Run git-protocols spec
        env:
          CI: 'true'
          RUN_GIT_PROTOCOLS: '1'
        run: bun run e2e e2e/git-protocols.spec.ts

      - name: Upload Playwright trace + gitea logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: git-protocols-failure
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

      - name: Capture gitea logs on failure
        if: failure()
        run: docker logs aw-gitea-test 2>&1 | tee /tmp/gitea.log || true

      - name: Tear down gitea
        if: always()
        run: docker compose -f scripts/git-protocols/docker-compose.test.yml down -v
