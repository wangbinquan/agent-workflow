# RFC-054 W2-1 — live opencode + LLM integration sweep.
#
# Why a separate workflow (vs. extending ci.yml):
#   * These tests make real LLM calls — they cost money and take 30-60s
#     wall-clock. Running them on every PR would burn ~$100/mo and slow
#     the gate by ~50%.
#   * They probe upstream drift, not the PR. A nightly cadence + a
#     targeted path-filter (PRs that touch the daemon's opencode-facing
#     code) catches the right things at the right time.
#   * They REQUIRE secrets (ANTHROPIC_API_KEY / OPENCODE_AUTH_CONTENT).
#     If unconfigured the workflow stays green — the gate tests pass and
#     the LLM tests skip. That's the desired graceful-degrade behaviour.
#
# Trigger:
#   * `schedule` — 07:30 UTC daily (15-min offset from the webkit
#     nightly so they don't queue behind each other on the free runner
#     pool).
#   * `workflow_dispatch` — manual button for ad-hoc verification after
#     bumping `MIN_OPENCODE_VERSION` etc.
#   * `pull_request` — only when the PR diff touches the daemon's
#     opencode interface or this workflow itself. Path filter is the
#     tightest gate possible: every other PR skips this workflow
#     entirely.
#
# Matrix: ubuntu-only (macOS LLM parity covered by the daemon's PR e2e),
# one exact opencode version — RFC-224's official v1.18.3 execution identity.
# Newer releases are diagnosed separately and require a new pinned codec/build
# review before they are executable.

name: integration-opencode

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
  # This repository is developed main-only (no PR branches), so a
  # `pull_request`-only path filter never fires on the commit that actually
  # changes the opencode interface — the drift sentinel was decoupled from the
  # code it guards and left running on a daily cron alone. Mirror the same
  # filter on `push` so the sweep runs at the moment the interface moves, the
  # way visual-regression-nightly already does.
  # See design/test-guard-audit-2026-07-21 §2 逃逸机制⑥ / gap M2-harness-2.
  push:
    branches: [main]
    paths:
      - 'packages/backend/src/services/runner.ts'
      - 'packages/backend/src/services/envelope.ts'
      - 'packages/backend/src/services/protocol.ts'
      # 6adf3ea1: the whole opencode compat surface — driver/spawn/events + the
      # version-registry/flag utils + the shell stubs — a CLI-flag rename here
      # (e.g. 1964a0d0) must trigger the live sweep, not slip through.
      - 'packages/backend/src/services/runtime/opencode/**'
      - 'packages/backend/src/util/opencode*.ts'
      - 'packages/backend/src/opencode-plugin/**'
      - 'packages/backend/tests/integration-opencode/**'
      - 'e2e/fixtures/stub-opencode*.sh'
      - '.github/workflows/integration-opencode.yml'
  pull_request:
    paths:
      - 'packages/backend/src/services/runner.ts'
      - 'packages/backend/src/services/envelope.ts'
      - 'packages/backend/src/services/protocol.ts'
      # 6adf3ea1: the whole opencode compat surface — driver/spawn/events + the
      # version-registry/flag utils + the shell stubs — a CLI-flag rename here
      # (e.g. 1964a0d0) must trigger the live sweep, not slip through.
      - 'packages/backend/src/services/runtime/opencode/**'
      - 'packages/backend/src/util/opencode*.ts'
      - 'packages/backend/src/opencode-plugin/**'
      - 'packages/backend/tests/integration-opencode/**'
      - 'e2e/fixtures/stub-opencode*.sh'
      - '.github/workflows/integration-opencode.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: opencode ${{ matrix.opencode }} (ubuntu)
    runs-on: ubuntu-latest
    strategy:
      # Keep the matrix form explicit for future reviewed official-build bumps.
      fail-fast: false
      matrix:
        opencode:
          # RFC-224 admits only this exact reviewed build/version tuple.
          - '1.18.3'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install opencode-ai@${{ matrix.opencode }}
        run: |
          bun install -g opencode-ai@${{ matrix.opencode }}
          export PATH="$HOME/.bun/bin:$PATH"
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install RFC-224 Linux sandbox TCB
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap_path="$(command -v bwrap)"
          bwrap_mode="$(stat -c '%a' "$bwrap_path")"
          test "$(stat -c '%u' "$bwrap_path")" = 0
          test "$((8#$bwrap_mode & 8#22))" -eq 0

      - name: Run integration suite
        env:
          # If either secret is set, the gate flips on. Both are
          # optional — without them the LLM tests skip and the gate
          # tests still pass (graceful degrade, see
          # tests/integration-opencode/README.md §Setting up CI secrets).
          RUN_OPENCODE_INTEGRATION: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCODE_AUTH_CONTENT: ${{ secrets.OPENCODE_AUTH_CONTENT }}
          # Keep opencode noisy in case a case fails — stderr is the
          # primary debug channel for live LLM issues.
          OPENCODE_LOG_LEVEL: 'info'
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          # Filter to just the integration directory so bunfig.toml's
          # default root selection doesn't drag in the entire backend
          # suite — only the live ones run here.
          bun test packages/backend/tests/integration-opencode/

      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: integration-opencode-${{ matrix.opencode }}
          path: |
            **/*.log
            packages/backend/tests/integration-opencode/**/*.txt
          if-no-files-found: ignore
