# RFC-054 W2-5 — visual regression nightly + path-filtered PR gate.
#
# Compares ubuntu-rendered snapshots of 25 full pages
# plus 6 focused components against the committed `*-chromium-linux.png` baselines under
# `e2e/visual-regression.spec.ts-snapshots/`. Threshold is 0.2%
# per RFC-054 plan §risk 9.
#
# Trigger:
#   * `schedule` — 09:00 UTC daily (15 min after git-protocols nightly).
#   * `workflow_dispatch` — manual button for refreshing ubuntu
#     baselines (see e2e/visual-regression.README.md option A).
#   * `pull_request` — only when the diff touches the frontend or
#     the visual gate and its direct dependencies.
#   * `push` — the same path-filtered gate after changes land on main.
#
# CI ubuntu baselines must be committed before the gate is operational.
# The first run after this workflow lands will FAIL because the
# `*-chromium-linux.png` files don't exist yet. A separate one-time
# "chore(visual): seed ubuntu baselines" PR populates them — see
# `e2e/visual-regression.README.md` for the procedure.

name: visual-regression-nightly

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/frontend/**'
      - 'e2e/ux-consistency.spec.ts'
      - 'e2e/visual-regression.spec.ts'
      - 'e2e/visual-regression.spec.ts-snapshots/**'
      - 'e2e/harness.ts'
      - 'e2e/inbox-fixtures.ts'
      - 'e2e/fixtures/stub-opencode.sh'
      - 'e2e/README.md'
      - 'e2e/visual-regression.README.md'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'playwright.config.ts'
      - '.github/workflows/visual-regression-nightly.yml'
  pull_request:
    paths:
      - 'packages/frontend/**'
      - 'e2e/ux-consistency.spec.ts'
      - 'e2e/visual-regression.spec.ts'
      - 'e2e/visual-regression.spec.ts-snapshots/**'
      - 'e2e/harness.ts'
      - 'e2e/inbox-fixtures.ts'
      - 'e2e/fixtures/stub-opencode.sh'
      - 'e2e/README.md'
      - 'e2e/visual-regression.README.md'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'playwright.config.ts'
      - '.github/workflows/visual-regression-nightly.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the main CI runtime probe instead of letting an unrelated `latest`
  # release change screenshot startup behavior between otherwise identical runs.
  OPENCODE_VERSION: '1.15.5'

jobs:
  visual-regression:
    name: Playwright visual regression (ubuntu)
    # Pin the authoritative hosted-runner pixel environment instead of letting
    # ubuntu-latest change underneath baselines.
    runs-on: ubuntu-24.04
    # Includes a cold browser + system dependency install, so retain generous
    # headroom while avoiding Actions' six-hour default on a stuck daemon/browser.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install opencode (daemon dependency)
        run: |
          bun install -g opencode-ai@${{ env.OPENCODE_VERSION }}
          export PATH="$HOME/.bun/bin:$PATH"
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build daemon binary
        run: bun run build:binary

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression spec
        env:
          CI: 'true'
        run: bun run test:visual -- --retries=0

      - name: Upload diff artifacts on failure
        # Contains the actual rendered PNGs that diverged — used to
        # populate fresh ubuntu baselines via the option-A procedure
        # in e2e/visual-regression.README.md.
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: visual-regression-failure
          path: |
            test-results/
            playwright-report/
            e2e/visual-regression.spec.ts-snapshots/
          if-no-files-found: ignore
